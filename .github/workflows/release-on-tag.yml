name: Release On Version Tag

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-tag:
    name: Verify Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      target_sha: ${{ steps.verify.outputs.target_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify SemVer tag and main ancestry
        id: verify
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Only production SemVer tags like v1.2.3 are allowed here." >&2
            exit 1
          fi

          TARGET_SHA="$(git rev-list -n 1 "${TAG_NAME}")"
          git fetch origin +refs/heads/main:refs/remotes/origin/main

          # A release tag must point to history already contained in main.
          if ! git merge-base --is-ancestor "${TARGET_SHA}" "origin/main"; then
            echo "Tag ${TAG_NAME} does not reference a commit reachable from main." >&2
            exit 1
          fi

          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"

  ci:
    name: Run CI
    needs: verify-tag
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  package:
    name: Build Release Artifacts
    needs:
      - verify-tag
      - ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Derive release metadata
        id: meta
        run: |
          echo "artifact_name=xml-runtime-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build source archives
        run: |
          mkdir -p dist
          PREFIX="${{ steps.meta.outputs.artifact_name }}/"
          git archive --format=tar.gz --output="dist/${{ steps.meta.outputs.artifact_name }}.tar.gz" --prefix="${PREFIX}" HEAD
          git archive --format=zip --output="dist/${{ steps.meta.outputs.artifact_name }}.zip" --prefix="${PREFIX}" HEAD

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - verify-tag
      - package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.artifact_name }}
          path: dist

      - name: Create or update production release
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
